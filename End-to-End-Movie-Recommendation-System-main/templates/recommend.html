<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="movie-details">

    <h1 class="movie-title">{{ title }}</h1>

    <div class="details-wrapper">
        <img src="{{ poster }}" class="poster">

        <div class="info">
            <p><b>Overview:</b> {{ overview }}</p>
            <p><b>Genres:</b> {{ genres }}</p>
            <p><b>Rating:</b> {{ rating }} ({{ vote_count }} votes)</p>
            <p><b>Release:</b> {{ release_date }}</p>
            <p><b>Runtime:</b> {{ runtime }}</p>
            <p><b>Status:</b> {{ status }}</p>
        </div>
    </div>

    <h2 class="section-title">Recommended Movies</h2>

    <div class="movies-grid">
        {% for poster, movie in movie_cards.items() %}
        <div class="movie-card" onclick="recommendcard(this)" title="{{ movie }}">
            <img src="{{ poster }}">
            <p>{{ movie }}</p>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{{ url_for('static', filename='recommend.js') }}"></script>
</body>
</html>
