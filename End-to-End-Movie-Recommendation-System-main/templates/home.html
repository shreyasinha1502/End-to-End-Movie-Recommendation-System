<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Recommendation System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="hero">
    <h1>🎬 Movie Recommendation System</h1>

    <!-- 🔥 FIX 1: autocomplete off + proper input -->
    <input
        id="autoComplete"
        class="movie"
        list="movies"
        placeholder="Enter movie name..."
        autocomplete="off"
    >

    <datalist id="movies">
        {% for movie in suggestions %}
            <option value="{{ movie }}">
        {% endfor %}
    </datalist>

    <!-- 🔥 FIX 2: type="button" (VERY IMPORTANT) -->
    <button type="button" class="movie-button" disabled>
        Recommend
    </button>
</div>

<!-- Error message -->
<div class="fail" style="display:none;">
    ❌ Movie not found
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- 🔥 JS (correct & final) -->
<script src="{{ url_for('static', filename='recommend.js') }}"></script>

</body>
</html>
